<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>其 / Sonoscope ― 月次目標管理ボード</title>
<style>
  :root{
    --ink:#f4f6f9; --ink2:#ffffff; --panel:#ffffff; --panel2:#f0f2f5;
    --line:#e2e7ee; --line2:#cdd5df;
    --paper:#1a2230; --mist:#5a6675; --sub:#8791a0; --faint:#aab3bf;
    --plan:#2f80ed;    /* 商品企画=青 */
    --reach:#12a35a;   /* 集客=緑 */
    --sales:#e8850c;   /* 販売=橙 */
    --accent:#7b42d6;  /* Sonoscope紫 */
    --ok:#12a35a; --warn:#c98a00; --bad:#d64545;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--paper);
    font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    line-height:1.6;font-size:14px;padding:0 0 80px;-webkit-font-smoothing:antialiased}

  /* ===== ヘッダー ===== */
  .top{background:#ffffff;
    border-bottom:1px solid var(--line);padding:26px 32px 22px;
    position:sticky;top:0;z-index:20}
  .top-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;
    justify-content:space-between;gap:20px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .mk-logo{height:54px;width:auto;display:block}
  .brand .ttl{font-size:17px;font-weight:800;letter-spacing:.02em}
  .brand .sub{font-size:11px;color:var(--sub);letter-spacing:.14em;margin-top:2px}

  .month-nav{display:flex;align-items:center;gap:6px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:5px 6px}
  .month-nav button{appearance:none;background:transparent;border:none;color:var(--mist);
    font-size:18px;cursor:pointer;width:32px;height:32px;border-radius:8px;transition:.15s}
  .month-nav button:hover{background:var(--panel2);color:var(--paper)}
  .month-nav .mlabel{font-size:15px;font-weight:700;min-width:118px;text-align:center;
    font-variant-numeric:tabular-nums;letter-spacing:.02em}

  /* ===== サマリー帯 ===== */
  .summary{max-width:1180px;margin:22px auto 0;padding:0 32px;
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:760px){.summary{grid-template-columns:repeat(2,1fr)}}
  .sum-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .sum-card .sc-label{font-size:11px;color:var(--sub);letter-spacing:.08em;margin-bottom:7px}
  .sum-card .sc-val{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .sum-card .sc-unit{font-size:12px;color:var(--mist);font-weight:500;margin-left:3px}
  .sum-card .sc-bar{height:5px;border-radius:4px;background:#eef1f5;margin-top:11px;overflow:hidden}
  .sum-card .sc-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
  .sum-card .sc-sub{font-size:10.5px;color:var(--sub);margin-top:6px}

  /* ===== 柱セクション ===== */
  .wrap{max-width:1180px;margin:0 auto;padding:26px 32px}
  .pillar{margin-bottom:28px}
  .pillar-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .pillar-dot{width:11px;height:11px;border-radius:50%}
  .pillar-name{font-size:16px;font-weight:800;letter-spacing:.02em}
  .pillar-tag{font-size:11px;color:var(--sub);margin-left:2px}

  .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
  @media(max-width:760px){.metrics{grid-template-columns:1fr}}

  .metric{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:15px 17px;transition:border-color .2s}
  .metric:hover{border-color:var(--line2)}
  .metric.wide{grid-column:1/-1}
  .m-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
  .m-name{font-size:13.5px;font-weight:700}
  .m-note{font-size:10.5px;color:var(--sub);margin-top:2px;font-weight:400}
  .m-pct{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;
    padding:2px 9px;border-radius:20px}

  .m-io{display:flex;align-items:center;gap:10px}
  .m-field{flex:1}
  .m-field label{font-size:10px;color:var(--sub);display:block;margin-bottom:3px;letter-spacing:.04em}
  .m-field .row{display:flex;align-items:baseline;gap:5px}
  .m-field input{width:100%;background:#f7f9fc;border:1px solid var(--line);color:var(--paper);
    font-family:inherit;font-size:16px;font-weight:700;padding:7px 10px;border-radius:9px;
    font-variant-numeric:tabular-nums;transition:.15s;-moz-appearance:textfield}
  .m-field input::-webkit-outer-spin-button,.m-field input::-webkit-inner-spin-button{-webkit-appearance:none}
  .m-field input:focus{outline:none;border-color:var(--accent);background:#fbfcfe;box-shadow:0 0 0 3px rgba(123,66,214,.1)}
  .m-unit{font-size:11px;color:var(--sub);white-space:nowrap}
  .m-arrow{color:var(--faint);font-size:16px;padding-top:16px}
  .m-bar{height:6px;border-radius:4px;background:#eef1f5;margin-top:12px;overflow:hidden}
  .m-fill{height:100%;border-radius:4px;width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}

  /* 交流会リスト（wide） */
  .events{margin-top:6px}
  .events .ev-add{display:flex;gap:8px;margin-bottom:10px}
  .events .ev-add input{flex:1;background:#f7f9fc;border:1px solid var(--line);color:var(--paper);
    font-family:inherit;font-size:13px;padding:8px 11px;border-radius:9px}
  .events .ev-add input:focus{outline:none;border-color:var(--reach)}
  .events .ev-add button{appearance:none;background:var(--reach);color:#fff;border:none;
    font-family:inherit;font-weight:800;font-size:13px;padding:0 18px;border-radius:9px;cursor:pointer;
    transition:.15s;white-space:nowrap}
  .events .ev-add button:hover{filter:brightness(1.08)}
  .ev-list{display:flex;flex-direction:column;gap:6px}
  .ev-item{display:flex;align-items:center;gap:10px;background:#f7f9fc;border:1px solid var(--line);
    border-radius:9px;padding:8px 12px;font-size:13px}
  .ev-item .ev-date{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}
  .ev-item .ev-name{flex:1;font-weight:600}
  .ev-item .ev-contacts{font-size:11px;color:var(--reach);white-space:nowrap}
  .ev-item .ev-del{appearance:none;background:transparent;border:none;color:var(--faint);
    cursor:pointer;font-size:15px;padding:2px 4px;border-radius:5px;transition:.15s}
  .ev-item .ev-del:hover{color:var(--bad);background:var(--panel2)}
  .ev-empty{font-size:12px;color:var(--faint);padding:8px 4px;font-style:italic}

  /* ツール整備（チェックリスト） */
  .tools{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .tool{display:flex;align-items:center;gap:11px;padding:6px 2px}
  .tool input[type=checkbox]{appearance:none;width:20px;height:20px;border:1.5px solid var(--line2);
    border-radius:6px;cursor:pointer;position:relative;flex-shrink:0;transition:.15s;background:#f7f9fc}
  .tool input[type=checkbox]:checked{background:var(--reach);border-color:var(--reach)}
  .tool input[type=checkbox]:checked::after{content:'✓';position:absolute;color:#fff;
    font-size:14px;font-weight:900;left:3px;top:-1px}
  .tool .t-name{font-size:13.5px;font-weight:600;transition:.15s}
  .tool input:checked + .t-name{color:var(--sub);text-decoration:line-through}
  .tool .t-add-inp{flex:1;background:transparent;border:none;color:var(--paper);font-family:inherit;
    font-size:13.5px;padding:2px}
  .tool .t-add-inp:focus{outline:none}
  .tool-add{display:flex;gap:8px;margin-top:4px}
  .tool-add input{flex:1;background:#f7f9fc;border:1px solid var(--line);color:var(--paper);
    font-family:inherit;font-size:13px;padding:8px 11px;border-radius:9px}
  .tool-add input:focus{outline:none;border-color:var(--reach)}
  .tool-add button{appearance:none;background:var(--panel2);color:var(--mist);border:1px solid var(--line2);
    font-family:inherit;font-weight:700;font-size:13px;padding:0 16px;border-radius:9px;cursor:pointer}
  .tool-add button:hover{color:var(--paper)}
  .t-del{appearance:none;background:transparent;border:none;color:var(--faint);cursor:pointer;
    font-size:14px;padding:2px 5px;border-radius:5px;margin-left:auto}
  .t-del:hover{color:var(--bad)}

  .foot{text-align:center;font-size:11px;color:var(--faint);letter-spacing:.08em;margin-top:20px}

  /* タスク管理 */
  .tasks-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;margin-bottom:12px}
  .task-item{display:flex;align-items:center;gap:12px;background:#f7f9fc;border:1px solid var(--line);
    border-radius:10px;padding:9px 13px}
  .task-name{flex:1;font-size:13.5px;font-weight:600}
  .task-name.tdone{color:var(--sub);text-decoration:line-through}
  .st-group{display:flex;gap:4px;flex-shrink:0}
  .st-btn{appearance:none;background:#fff;border:1px solid var(--line);color:var(--sub);
    font-family:inherit;font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:20px;cursor:pointer;transition:.15s}
  .st-btn:hover{border-color:var(--line2)}
  .st-btn.on{font-weight:800}
  .task-add{display:flex;gap:8px}
  .task-add input{flex:1;background:#f7f9fc;border:1px solid var(--line);color:var(--paper);
    font-family:inherit;font-size:13px;padding:8px 11px;border-radius:9px}
  .task-add input:focus{outline:none;border-color:var(--plan)}
  .task-add button{appearance:none;background:var(--plan);color:#fff;border:none;
    font-family:inherit;font-weight:800;font-size:13px;padding:0 18px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .task-add button:hover{filter:brightness(1.08)}

  /* 週次グリッド */
  .wk-grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:8px 12px;align-items:center;
    margin:6px 0 12px;max-width:460px}
  .wk-head{font-size:10.5px;color:var(--sub);letter-spacing:.06em;font-weight:700;padding-bottom:2px}
  .wk-wlabel{font-size:13px;font-weight:700;color:var(--mist);white-space:nowrap}
  .wk-inp{width:100%;background:#f7f9fc;border:1px solid var(--line);color:var(--paper);
    font-family:inherit;font-size:15px;font-weight:700;padding:6px 10px;border-radius:8px;
    font-variant-numeric:tabular-nums;-moz-appearance:textfield}
  .wk-inp::-webkit-outer-spin-button,.wk-inp::-webkit-inner-spin-button{-webkit-appearance:none}
  .wk-inp:focus{outline:none;border-color:var(--reach);background:#fbfcfe}
  .wk-total{font-size:13px;color:var(--mist);margin-bottom:8px}
  .wk-total b{color:var(--paper);font-size:15px;font-variant-numeric:tabular-nums}

  .save-hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:#fff;font-size:12.5px;font-weight:700;padding:9px 20px;
    border-radius:30px;opacity:0;transition:.3s;pointer-events:none;z-index:50;
    box-shadow:0 8px 30px rgba(123,66,214,.3)}
  .save-hint.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script type="module">
// ============================================================
//  月次目標管理ボード（Firebase / Firestore 版）
//  3本柱（商品企画・集客・販売）× 月次。入力はFirestoreに自動保存＆端末間で同期。
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJw3HI96WxUGDfYEGC0cQ4m5rb0aZpJ3M",
  authDomain: "sonoscope-d7b31.firebaseapp.com",
  projectId: "sonoscope-d7b31",
  storageBucket: "sonoscope-d7b31.firebasestorage.app",
  messagingSenderId: "540490710312",
  appId: "1:540490710312:web:2541fde76d2f82c157641d"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ▼ ログインなし方式の「合言葉」コレクション名。
//   セキュリティルールで、このコレクション名を知る人だけ読み書き可にする。
//   推測されにくい文字列にしてある（変更する場合はルール側も合わせる）。
const SECRET_COLLECTION = "board_sono_9f3a7c2e";


// ---- 指標定義 ----
const PILLARS = [
  {
    key:'plan', name:'商品企画', tag:'新たな商品を作る・品質を高める', color:'var(--plan)', hex:'#2f80ed',
    metrics:[
      { key:'quality', name:'サービス品質向上・新規商品', note:'取り組むタスクとステータスを管理', type:'tasks', wide:true },
    ]
  },
  {
    key:'reach', name:'集客', tag:'知名度UP・顧客リストを増やす', color:'var(--reach)', hex:'#12a35a',
    metrics:[
      { key:'insta_post', name:'インスタ投稿数', note:'週ごとの目標・実績を入力（月計は自動集計）', type:'weekly', unit:'投稿', wide:true },
      { key:'followers', name:'フォロワー数', note:'月末時点の総数', unit:'人', cumulative:true },
      { key:'contacts', name:'連絡先交換者数', note:'今月新たに交換した人数', unit:'人' },
    ]
  },
  {
    key:'sales', name:'販売', tag:'数を売る・売上UP・客単価を上げる', color:'var(--sales)', hex:'#e8850c',
    metrics:[
      { key:'buyers', name:'商品ごとの購入者数', note:'今月の購入者（合計）', unit:'人' },
      { key:'sales_total', name:'売上合計', note:'今月の総売上', unit:'円', money:true, wide:true },
    ]
  },
];

// 月キー（YYYY-MM）
let cur = new Date();
function ymKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function ymLabel(d){ return d.getFullYear()+'年 '+(d.getMonth()+1)+'月'; }

const $ = id => document.getElementById(id);
let saveTimer=null;
function flashSaved(){ const h=$('saveHint'); h.classList.add('show');
  clearTimeout(saveTimer); saveTimer=setTimeout(()=>h.classList.remove('show'),1400); }

// ---- ストレージ（Firestore） ----
let unsub = null;               // リアルタイム購読の解除用
let applyingRemote = false;     // リモート反映中フラグ（保存ループ防止）

async function loadMonth(key){
  try{
    const snap = await getDoc(doc(db, SECRET_COLLECTION, key));
    return snap.exists() ? (snap.data().payload || {}) : {};
  }catch(e){ console.error('load failed', e); showError(); return {}; }
}
async function saveMonth(key, data){
  if(applyingRemote) return;    // リモート反映のときは書き戻さない
  try{
    await setDoc(doc(db, SECRET_COLLECTION, key), { payload:data, updatedAt:Date.now() });
    flashSaved();
  }catch(e){ console.error('save failed', e); showError(); }
}
// 表示中の月をリアルタイム購読（他端末の変更が自動で反映される）
function subscribeMonth(key){
  if(unsub){ unsub(); unsub=null; }
  unsub = onSnapshot(doc(db, SECRET_COLLECTION, key), snap=>{
    if(!snap.exists()) return;
    const remote = snap.data().payload || {};
    // 入力中でなければ反映（フォーカス中の上書きを避ける）
    if(document.activeElement && document.activeElement.tagName==='INPUT') return;
    applyingRemote = true;
    state = remote;
    render();
    applyingRemote = false;
  }, err=>{ console.error('subscribe error', err); showError(); });
}

function showError(){
  let b=document.getElementById('errBar');
  if(!b){
    b=document.createElement('div'); b.id='errBar';
    b.style.cssText='position:fixed;top:0;left:0;right:0;background:#d64545;color:#fff;'+
      'font-size:12.5px;text-align:center;padding:7px;z-index:100;font-weight:600';
    b.textContent='⚠ 保存/読み込みに失敗しました。Firebaseの設定（セキュリティルール・ネット接続）をご確認ください。';
    document.body.appendChild(b);
  }
}

let state = {};   // 現在表示中の月データ
let curKey = ymKey(cur);

async function switchMonth(d){
  cur = d; curKey = ymKey(cur);
  $('monthLabel').textContent = ymLabel(cur);
  state = await loadMonth(curKey);
  render();
  subscribeMonth(curKey);   // その月をリアルタイム購読
}

// 値の取得・保存ヘルパー
function getV(mkey, field){ return (state[mkey]&&state[mkey][field]!=null)?state[mkey][field]:''; }
function setV(mkey, field, val){
  if(!state[mkey]) state[mkey]={};
  state[mkey][field]= val;
  saveMonth(curKey, state);
  updateDerived();
}

function fmtMoney(n){ return n==''||n==null?'—':'¥'+Number(n).toLocaleString('ja-JP'); }
function pct(actual, target){
  const a=Number(actual)||0, t=Number(target)||0;
  if(t<=0) return null;
  return Math.round(a/t*100);
}
function pctColor(p){
  if(p==null) return 'var(--sub)';
  if(p>=100) return 'var(--ok)';
  if(p>=60) return 'var(--warn)';
  return 'var(--bad)';
}

// ---- 描画 ----
function render(){
  const board=$('board'); board.innerHTML='';
  PILLARS.forEach(p=>{
    const sec=document.createElement('div'); sec.className='pillar';
    sec.innerHTML='<div class="pillar-head"><span class="pillar-dot" style="background:'+p.color+'"></span>'+
      '<span class="pillar-name">'+p.name+'</span><span class="pillar-tag">'+p.tag+'</span></div>';
    const grid=document.createElement('div'); grid.className='metrics';
    p.metrics.forEach(m=> grid.appendChild(metricCard(m, p)));
    // 集客には交流会リストを追加
    if(p.key==='reach') grid.appendChild(eventsCard(p));
    // 集客にはツール整備チェックリストを追加
    if(p.key==='reach') grid.appendChild(toolsCard(p));
    // 販売には客単価（自動計算）を追加
    if(p.key==='sales') grid.appendChild(aovCard(p));
    sec.appendChild(grid);
    board.appendChild(sec);
  });
  renderSummary();
  updateDerived();
}

function metricCard(m, p){
  if(m.type==='tasks') return taskCard(m, p);
  if(m.type==='weekly') return weeklyCard(m, p);
  const el=document.createElement('div'); el.className='metric'+(m.wide?' wide':'');
  el.dataset.mkey=m.key;
  const tv=getV(m.key,'target'), av=getV(m.key,'actual');
  const pv=pct(av,tv);
  el.innerHTML=
    '<div class="m-top"><div><div class="m-name">'+m.name+'</div>'+
      (m.note?'<div class="m-note">'+m.note+'</div>':'')+'</div>'+
      '<div class="m-pct" data-pct style="color:'+pctColor(pv)+';background:'+(pv!=null?'rgba(0,0,0,.05)':'transparent')+'">'+
        (pv!=null?pv+'%':'—')+'</div></div>'+
    '<div class="m-io">'+
      '<div class="m-field"><label>目標</label><div class="row">'+
        '<input type="number" inputmode="numeric" data-f="target" placeholder="0" value="'+tv+'">'+
        '<span class="m-unit">'+m.unit+'</span></div></div>'+
      '<div class="m-arrow">→</div>'+
      '<div class="m-field"><label>実績</label><div class="row">'+
        '<input type="number" inputmode="numeric" data-f="actual" placeholder="0" value="'+av+'">'+
        '<span class="m-unit">'+m.unit+'</span></div></div>'+
    '</div>'+
    '<div class="m-bar"><div class="m-fill" data-fill style="background:'+p.color+'"></div></div>';
  // イベント
  el.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      setV(m.key, inp.dataset.f, inp.value===''?'':Number(inp.value));
    });
  });
  return el;
}

// ===== タスク管理カード（商品企画） =====
const STATUSES = [
  { key:'todo', label:'未着手', color:'var(--faint)', bg:'#eef1f5' },
  { key:'doing', label:'進行中', color:'#2f80ed', bg:'#e7f0fd' },
  { key:'done', label:'完了', color:'#12a35a', bg:'#e5f5ec' },
];
function taskCard(m, p){
  const el=document.createElement('div'); el.className='metric wide'; el.dataset.mkey=m.key;
  el.innerHTML=
    '<div class="m-top"><div><div class="m-name">'+m.name+'</div>'+
      '<div class="m-note">'+m.note+'</div></div>'+
      '<div class="m-pct" id="taskCount" style="color:'+p.color+';background:rgba(0,0,0,.05)">—</div></div>'+
    '<div class="tasks-list" id="taskList"></div>'+
    '<div class="task-add">'+
      '<input type="text" id="taskInp" placeholder="タスクを追加（例：声色診断のカード化、セミナーBGMの品質改善）">'+
      '<button id="taskAddBtn">＋ 追加</button>'+
    '</div>';
  return el;
}
function renderTasks(){
  const list=$('taskList'); if(!list) return;
  const tasks=(state._tasks)||[];
  const done=tasks.filter(t=>t.status==='done').length;
  const cnt=$('taskCount'); if(cnt) cnt.textContent = tasks.length? (done+' / '+tasks.length+' 完了') : '—';
  if(!tasks.length){ list.innerHTML='<div class="ev-empty">まだタスクがありません。今月取り組むことを追加しましょう。</div>'; return; }
  list.innerHTML='';
  tasks.forEach((t,i)=>{
    const el=document.createElement('div'); el.className='task-item';
    let btns='';
    STATUSES.forEach(s=>{
      const on=s.key===t.status;
      btns+='<button class="st-btn'+(on?' on':'')+'" data-i="'+i+'" data-st="'+s.key+'" '+
        'style="'+(on?('background:'+s.bg+';color:'+s.color+';border-color:'+s.color):'')+'">'+s.label+'</button>';
    });
    el.innerHTML=
      '<span class="task-name'+(t.status==='done'?' tdone':'')+'">'+escapeHtml(t.name)+'</span>'+
      '<div class="st-group">'+btns+'</div>'+
      '<button class="ev-del" data-del="'+i+'" aria-label="削除">✕</button>';
    list.appendChild(el);
  });
  list.querySelectorAll('.st-btn').forEach(b=>b.addEventListener('click',()=>{
    state._tasks[Number(b.dataset.i)].status=b.dataset.st; saveMonth(curKey,state); renderTasks();
  }));
  list.querySelectorAll('.ev-del').forEach(b=>b.addEventListener('click',()=>{
    state._tasks.splice(Number(b.dataset.del),1); saveMonth(curKey,state); renderTasks();
  }));
}

// ===== 週次カード（インスタ投稿数） =====
function weeklyCard(m, p){
  const el=document.createElement('div'); el.className='metric wide'; el.dataset.mkey=m.key;
  el.innerHTML=
    '<div class="m-top"><div><div class="m-name">'+m.name+'</div>'+
      '<div class="m-note">'+m.note+'</div></div>'+
      '<div class="m-pct" data-pct id="wkPct">—</div></div>'+
    '<div class="wk-grid" id="wkGrid"></div>'+
    '<div class="wk-total" id="wkTotal"></div>'+
    '<div class="m-bar"><div class="m-fill" id="wkFill" style="background:'+p.color+'"></div></div>';
  return el;
}
function renderWeekly(m){
  const grid=$('wkGrid'); if(!grid) return;
  const wk = (state._weekly)||{};
  const nWeeks = weeksInMonth(cur);
  grid.innerHTML='<div class="wk-head">週</div><div class="wk-head">目標</div><div class="wk-head">実績</div>';
  for(let w=1; w<=nWeeks; w++){
    const t=(wk[w]&&wk[w].target!=null)?wk[w].target:'';
    const a=(wk[w]&&wk[w].actual!=null)?wk[w].actual:'';
    grid.insertAdjacentHTML('beforeend',
      '<div class="wk-wlabel">第'+w+'週</div>'+
      '<div><input type="number" inputmode="numeric" class="wk-inp" data-w="'+w+'" data-f="target" placeholder="0" value="'+t+'"></div>'+
      '<div><input type="number" inputmode="numeric" class="wk-inp" data-w="'+w+'" data-f="actual" placeholder="0" value="'+a+'"></div>');
  }
  recalcWeekly(m);
  grid.querySelectorAll('.wk-inp').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const w=inp.dataset.w, f=inp.dataset.f;
      if(!state._weekly) state._weekly={};
      if(!state._weekly[w]) state._weekly[w]={};
      state._weekly[w][f]= inp.value===''?'':Number(inp.value);
      recalcWeekly(m);
      saveMonth(curKey,state);
    });
  });
}
function recalcWeekly(m){
  const wk=(state._weekly)||{}; const nWeeks=weeksInMonth(cur);
  let sumT=0,sumA=0;
  for(let w=1;w<=nWeeks;w++){ if(wk[w]){ sumT+=Number(wk[w].target)||0; sumA+=Number(wk[w].actual)||0; } }
  const p2=pct(sumA,sumT);
  if($('wkTotal')) $('wkTotal').innerHTML='月計　目標 <b>'+sumT+'</b> 投稿　／　実績 <b>'+sumA+'</b> 投稿'+(p2!=null?'　（達成 '+p2+'%）':'');
  const pe=$('wkPct'); if(pe){ pe.textContent=(p2!=null?p2+'%':'—'); pe.style.color=pctColor(p2);
    pe.style.background=(p2!=null?'rgba(0,0,0,.05)':'transparent'); }
  const fill=$('wkFill'); if(fill) fill.style.width=Math.min(100,p2||0)+'%';
  if(!state['insta_post']) state['insta_post']={};
  state['insta_post'].target=sumT; state['insta_post'].actual=sumA;
  renderSummary();
}
function weeksInMonth(d){
  const days=new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  return Math.ceil(days/7);
}

// 客単価カード（売上合計÷購入者数の自動計算）
function aovCard(p){
  const el=document.createElement('div'); el.className='metric';
  el.id='aovCard';
  el.innerHTML=
    '<div class="m-top"><div><div class="m-name">客単価（平均）</div>'+
      '<div class="m-note">売上合計 ÷ 購入者数（自動計算）</div></div></div>'+
    '<div style="display:flex;align-items:baseline;gap:6px;margin-top:4px">'+
      '<span id="aovVal" style="font-size:30px;font-weight:800;font-variant-numeric:tabular-nums">—</span></div>'+
    '<div class="m-note" style="margin-top:8px" id="aovDetail"></div>';
  return el;
}

// 交流会リストカード
function eventsCard(p){
  const el=document.createElement('div'); el.className='metric wide';
  el.innerHTML=
    '<div class="m-top"><div><div class="m-name">交流会 参加ログ</div>'+
      '<div class="m-note">参加した交流会名・日付・その場の連絡先交換数を記録</div></div>'+
      '<div class="m-pct" id="evCount" style="color:var(--reach);background:rgba(0,0,0,.05)">0 件</div></div>'+
    '<div class="events">'+
      '<div class="ev-add">'+
        '<input type="date" id="evDate" style="flex:0 0 150px">'+
        '<input type="text" id="evName" placeholder="交流会名（例：守成クラブ 銀座例会）">'+
        '<input type="number" id="evContacts" placeholder="交換数" style="flex:0 0 90px">'+
        '<button id="evAddBtn">＋ 追加</button>'+
      '</div>'+
      '<div class="ev-list" id="evList"></div>'+
    '</div>';
  return el;
}

// ツール整備チェックリスト
function toolsCard(p){
  const el=document.createElement('div'); el.className='metric wide';
  el.innerHTML=
    '<div class="m-top"><div><div class="m-name">集客ツールの整備</div>'+
      '<div class="m-note">YouTube・LP など、集客につながるツールの整備状況</div></div>'+
      '<div class="m-pct" id="toolCount" style="color:var(--reach);background:rgba(0,0,0,.05)">0 / 0</div></div>'+
    '<div class="tools" id="toolList"></div>'+
    '<div class="tool-add">'+
      '<input type="text" id="toolInp" placeholder="整備したいツールを追加（例：YouTubeチャンネル開設、LP作成）">'+
      '<button id="toolAddBtn">＋ 追加</button>'+
    '</div>';
  return el;
}

// ---- サマリー帯 ----
function renderSummary(){
  const sum=$('summary');
  sum.innerHTML='';
  const cards=[
    { label:'売上（今月）', key:'sales_total', money:true, color:'#ffb86b' },
    { label:'購入者数', key:'buyers', unit:'人', color:'#ffb86b' },
    { label:'連絡先交換', key:'contacts', unit:'人', color:'#8affc1' },
    { label:'インスタ投稿', key:'insta_post', unit:'投稿', color:'#8affc1' },
  ];
  cards.forEach(c=>{
    const av=getV(c.key,'actual'), tv=getV(c.key,'target');
    const p=pct(av,tv);
    const div=document.createElement('div'); div.className='sum-card';
    const valTxt = c.money ? fmtMoney(av) : (av===''?'0':av);
    div.innerHTML='<div class="sc-label">'+c.label+'</div>'+
      '<div class="sc-val" style="color:'+c.color+'">'+valTxt+(c.unit?'<span class="sc-unit">'+c.unit+'</span>':'')+'</div>'+
      '<div class="sc-bar"><div class="sc-fill" style="width:'+Math.min(100,p||0)+'%;background:'+c.color+'"></div></div>'+
      '<div class="sc-sub">'+(p!=null?('目標 '+(c.money?fmtMoney(tv):tv+(c.unit||''))+' ／ 達成 '+p+'%'):'目標未設定')+'</div>';
    sum.appendChild(div);
  });
}

// ---- 派生値の更新（達成率バー・客単価・サマリー） ----
function updateDerived(){
  // 各メトリックのバーと％
  document.querySelectorAll('.metric[data-mkey]').forEach(el=>{
    const mkey=el.dataset.mkey;
    const tv=getV(mkey,'target'), av=getV(mkey,'actual');
    const p=pct(av,tv);
    const fill=el.querySelector('[data-fill]'); if(fill) fill.style.width=Math.min(100,p||0)+'%';
    const pe=el.querySelector('[data-pct]');
    if(pe){ pe.textContent=(p!=null?p+'%':'—'); pe.style.color=pctColor(p);
      pe.style.background=(p!=null?'rgba(0,0,0,.05)':'transparent'); }
  });
  // 客単価
  const sales=Number(getV('sales_total','actual'))||0;
  const buyers=Number(getV('buyers','actual'))||0;
  const aovV=$('aovVal'), aovD=$('aovDetail');
  if(aovV){
    if(buyers>0){ aovV.textContent='¥'+Math.round(sales/buyers).toLocaleString('ja-JP');
      aovV.style.color='#ffb86b';
      aovD.textContent=fmtMoney(sales)+' ÷ '+buyers+'人'; }
    else { aovV.textContent='—'; aovV.style.color='var(--faint)'; aovD.textContent='購入者数を入力すると算出されます'; }
  }
  renderSummaryValues();
  renderEvents();
  renderTools();
  renderTasks();
  renderWeekly({key:'insta_post'});
}
function renderSummaryValues(){
  const sum=$('summary'); if(!sum.children.length) return;
  renderSummary();
}

// ---- 交流会ログ ----
function renderEvents(){
  const list=$('evList'); if(!list) return;
  const evs = (state._events)||[];
  const cnt=$('evCount'); if(cnt) cnt.textContent=evs.length+' 件';
  if(!evs.length){ list.innerHTML='<div class="ev-empty">まだ記録がありません。参加した交流会を追加しましょう。</div>'; return; }
  list.innerHTML='';
  evs.forEach((ev,i)=>{
    const it=document.createElement('div'); it.className='ev-item';
    it.innerHTML='<span class="ev-date">'+(ev.date||'—')+'</span>'+
      '<span class="ev-name">'+escapeHtml(ev.name)+'</span>'+
      (ev.contacts?'<span class="ev-contacts">交換 '+ev.contacts+'</span>':'')+
      '<button class="ev-del" data-i="'+i+'" aria-label="削除">✕</button>';
    list.appendChild(it);
  });
  list.querySelectorAll('.ev-del').forEach(b=>b.addEventListener('click',()=>{
    state._events.splice(Number(b.dataset.i),1); saveMonth(curKey,state); updateDerived();
  }));
}

// ---- ツール整備 ----
function renderTools(){
  const list=$('toolList'); if(!list) return;
  const tools=(state._tools)||[];
  const done=tools.filter(t=>t.done).length;
  const cnt=$('toolCount'); if(cnt) cnt.textContent=done+' / '+tools.length;
  list.innerHTML='';
  tools.forEach((t,i)=>{
    const el=document.createElement('div'); el.className='tool';
    el.innerHTML='<input type="checkbox" '+(t.done?'checked':'')+' data-i="'+i+'">'+
      '<span class="t-name">'+escapeHtml(t.name)+'</span>'+
      '<button class="t-del" data-i="'+i+'" aria-label="削除">✕</button>';
    list.appendChild(el);
  });
  list.querySelectorAll('input[type=checkbox]').forEach(c=>c.addEventListener('change',()=>{
    state._tools[Number(c.dataset.i)].done=c.checked; saveMonth(curKey,state); renderTools();
  }));
  list.querySelectorAll('.t-del').forEach(b=>b.addEventListener('click',()=>{
    state._tools.splice(Number(b.dataset.i),1); saveMonth(curKey,state); renderTools();
  }));
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---- イベント委譲（動的要素） ----
document.addEventListener('click', e=>{
  if(e.target.id==='evAddBtn'){
    const d=$('evDate').value, n=$('evName').value.trim(), c=$('evContacts').value;
    if(!n){ $('evName').focus(); return; }
    if(!state._events) state._events=[];
    state._events.unshift({date:d, name:n, contacts:c?Number(c):0});
    $('evName').value=''; $('evContacts').value='';
    saveMonth(curKey,state); updateDerived();
  }
  if(e.target.id==='toolAddBtn'){
    const inp=$('toolInp'), n=inp.value.trim();
    if(!n){ inp.focus(); return; }
    if(!state._tools) state._tools=[];
    state._tools.push({name:n, done:false});
    inp.value=''; saveMonth(curKey,state); renderTools();
  }
  if(e.target.id==='taskAddBtn'){
    const inp=$('taskInp'), n=inp.value.trim();
    if(!n){ inp.focus(); return; }
    if(!state._tasks) state._tasks=[];
    state._tasks.push({name:n, status:'todo'});
    inp.value=''; saveMonth(curKey,state); renderTasks();
  }
});
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    if(e.target.id==='evName'||e.target.id==='evContacts') $('evAddBtn').click();
    if(e.target.id==='toolInp') $('toolAddBtn').click();
    if(e.target.id==='taskInp') $('taskAddBtn').click();
  }
});

// 月移動
$('prevM').addEventListener('click', ()=> switchMonth(new Date(cur.getFullYear(), cur.getMonth()-1, 1)));
$('nextM').addEventListener('click', ()=> switchMonth(new Date(cur.getFullYear(), cur.getMonth()+1, 1)));

// 初期化
switchMonth(new Date());
</script>
